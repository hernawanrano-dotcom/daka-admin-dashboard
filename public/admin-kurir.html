<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kurir - Daka Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 20% 50%, #0a0f2a, #030614); color: white; min-height: 100vh; }
        .top-bar { background: rgba(10,20,50,0.4); backdrop-filter: blur(10px); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,136,255,0.2); }
        .logo h2 { font-size: 1.2rem; background: linear-gradient(135deg, #fff, #0088ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .container { padding: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: rgba(10,20,50,0.4); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid rgba(0,136,255,0.2); }
        .stat-card h3 { font-size: 1.6rem; color: #0088ff; }
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid rgba(0,136,255,0.2); }
        .tab { padding: 10px 24px; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.3s; }
        .tab.active { background: #0088ff; color: white; }
        .table-wrapper { background: rgba(10,20,50,0.4); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(0,136,255,0.2); overflow: auto; max-height: 500px; }
        table { width: 100%; font-size: 0.75rem; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid rgba(0,136,255,0.1); }
        th { color: #0088ff; }
        select { padding: 6px 10px; background: #1a2040; border: 1px solid rgba(0,136,255,0.3); border-radius: 8px; color: white; }
        .btn-assign { padding: 6px 12px; background: #0088ff; border: none; border-radius: 6px; color: white; cursor: pointer; }
        .logout-icon { cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.3s; }
        .logout-icon:hover { background: rgba(255,68,68,0.2); color: #ff4444; }
    </style>
</head>
<body>
    <div class="top-bar"><div class="logo"><h2>DAKA ⚡ Express</h2></div><div><i class="fas fa-sign-out-alt logout-icon" onclick="logout()"></i></div></div>
    <div class="container">
        <div class="stats-grid"><div class="stat-card"><h3>24</h3><p>Total Order Hari Ini</p></div><div class="stat-card"><h3>8</h3><p>Pickup Belum Assign</p></div><div class="stat-card"><h3>12</h3><p>Delivery Belum Assign</p></div><div class="stat-card"><h3>16</h3><p>Sudah Assign</p></div></div>
        <div class="tabs"><div class="tab active" onclick="setTab('pickup')">📦 Pickup</div><div class="tab" onclick="setTab('delivery')">🚚 Delivery</div></div>
        <div class="table-wrapper"><table id="orderTable"><thead><tr><th>No Resi</th><th>Pengirim/Penerima</th><th>Alamat</th><th>Assign Kurir</th><th>Aksi</th></tr></thead><tbody></tbody></table></div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('daka_admin'));
        if (!user || user.role !== 'admin_kurir') window.location.href = 'login.html';
        let currentTab = 'pickup';
        const kurirList = ['Kurir A', 'Kurir B', 'Kurir C'];
        const pickupOrders = [{ noResi: 'DKA001', name: 'Budi Santoso', alamat: 'Jl. Malioboro No.10' }, { noResi: 'DKA002', name: 'Citra Dewi', alamat: 'Jl. Solo No.5' }];
        const deliveryOrders = [{ noResi: 'DKA003', name: 'Eka Putri', alamat: 'Jl. Magelang No.8' }, { noResi: 'DKA004', name: 'Fani Nur', alamat: 'Jl. Bantul No.3' }];
        function setTab(tab) { currentTab = tab; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelector(`.tab:${tab === 'pickup' ? 'first-child' : 'last-child'}`).classList.add('active'); renderOrders(); }
        function renderOrders() { const orders = currentTab === 'pickup' ? pickupOrders : deliveryOrders; document.getElementById('orderTable').innerHTML = `<thead><tr><th>No Resi</th><th>${currentTab === 'pickup' ? 'Pengirim' : 'Penerima'}</th><th>Alamat</th><th>Assign Kurir</th><th>Aksi</th></tr></thead><tbody>${orders.map(o => `<tr><td>${o.noResi}</td><td>${o.name}</td><td>${o.alamat}</td><td><select id="kurir_${o.noResi}">${kurirList.map(k => `<option value="${k}">${k}</option>`).join('')}</select></td><td><button class="btn-assign" onclick="alert('Assign ${o.noResi} ke ' + document.getElementById('kurir_${o.noResi}').value)">Assign</button></td></tr>`).join('')}</tbody>`; }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        renderOrders();
    </script>
</body>
</html>
